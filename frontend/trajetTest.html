<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>RentViz</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <link rel="stylesheet" href="test.css">
</head>
<body>

    <!-- MAP -->
    <section class="map-container">
        <div id="map"></div>
    </section>

    <!-- OFFERS -->
    <main class="offers-wrapper">

        <article class="offer-card">
            
            <div class="offer-content">

                <header class="offer-header">
                    <h2>Peugeot 308</h2>
                    <p>Manuelle · 5 places · Diesel</p>
                </header>

                <div class="vehicle-image">
                    <img src="https://cdn-icons-png.flaticon.com/512/743/743007.png" alt="Peugeot 308">
                </div>

                <footer class="offer-footer">
                    <span class="price">42€</span>
                    <button class="offer-btn">
                        Voir l’offre
                    </button>
                </footer>

            </div>

        </article>

    </main>

</body>
</html>
