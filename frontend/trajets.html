<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>RentViz – Offres</title>
    <link rel="stylesheet" href="css/test.css">
</head>
<body>

<main class="offers-container">

    <!-- OFFRE -->
    <article class="offer-card">

        <!-- Infos haut -->
        <div class="offer-header">
            <div>
                <h2 class="vehicle-name">Peugeot 208</h2>
                <p class="vehicle-info">
                    Essence • Manuelle • 5 places • Climatisation
                </p>
            </div>
        </div>

        <!-- Image véhicule -->
        <div class="vehicle-image">
            <img src="assets/peugeot208.png" alt="Peugeot 208">
        </div>

        <!-- Bas de carte -->
        <div class="offer-footer">
            <div class="price">
                42,90 €
            </div>

            <div class="offer-actions">
                <button class="negotiate-btn">💬 Négocier</button>
                <button class="offer-btn">
                    <img src="assets/logo-citiz.png" alt="Citiz">
                    Voir l’offre
                </button>
            </div>
        </div>

    </article>

</main>

</body>
</html>
