<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Roulez Malin — Connexion</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #f8f9ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Fond décoratif */
        body::before {
            content: '';
            position: fixed;
            top: -30%;
            right: -20%;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(37,99,235,0.08) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -20%;
            left: -15%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(99,102,241,0.07) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .auth-wrapper {
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 1;
            animation: fadeUp 0.6s cubic-bezier(.22,1,.36,1) both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Logo */
        .auth-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .auth-logo a {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 26px;
            color: #1a56db;
            text-decoration: none;
            letter-spacing: -0.5px;
        }
        .auth-logo p {
            font-size: 14px;
            color: #64748b;
            margin-top: 4px;
        }

        /* Card */
        .auth-card {
            background: white;
            border-radius: 24px;
            padding: 40px 36px;
            box-shadow: 0 20px 60px rgba(26,86,219,0.1), 0 4px 16px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.06);
        }

        /* Tabs */
        .auth-tabs {
            display: flex;
            background: #f1f5f9;
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 28px;
            gap: 4px;
        }
        .auth-tab {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 9px;
            background: transparent;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: #64748b;
            cursor: pointer;
            transition: all 0.2s;
        }
        .auth-tab.active {
            background: white;
            color: #1a56db;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        /* Formulaire */
        .auth-form { display: none; flex-direction: column; gap: 16px; }
        .auth-form.active { display: flex; }

        .field-group { display: flex; flex-direction: column; gap: 6px; }
        .field-group label {
            font-size: 13px;
            font-weight: 500;
            color: #374151;
        }
        .field-group input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1.5px solid #e5e7eb;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            color: #1e293b;
            background: #f9fafb;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
            outline: none;
        }
        .field-group input:focus {
            border-color: #1a56db;
            background: white;
            box-shadow: 0 0 0 3px rgba(26,86,219,0.1);
        }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        /* Bouton submit */
        .auth-btn {
            width: 100%;
            padding: 13px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #1a56db, #1240a8);
            color: white;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 4px;
            transition: transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 16px rgba(26,86,219,0.35);
        }
        .auth-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(26,86,219,0.45);
        }
        .auth-btn:active { transform: translateY(0); }
        .auth-btn:disabled {
            background: #cbd5e1;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        /* Message d'erreur / succès */
        .auth-msg {
            padding: 11px 14px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            display: none;
        }
        .auth-msg.error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; display: block; }
        .auth-msg.success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; display: block; }

        /* Séparateur */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 4px 0;
            color: #cbd5e1;
            font-size: 12px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e5e7eb;
        }

        /* Footer card */
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #64748b;
        }
        .auth-footer a {
            color: #1a56db;
            text-decoration: none;
            font-weight: 500;
        }
        .auth-footer a:hover { text-decoration: underline; }

        /* Spinner */
        .spinner-inline {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="auth-wrapper">

    <div class="auth-logo">
        <a href="index.html">Roulez Malin</a>
        <p>Votre comparateur de location de véhicules</p>
    </div>

    <div class="auth-card">

        <!-- Tabs -->
        <div class="auth-tabs">
            <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Connexion</button>
            <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Inscription</button>
        </div>

        <!-- Message -->
        <div class="auth-msg" id="auth-msg"></div>

        <!-- ── Formulaire Connexion ── -->
        <form class="auth-form active" id="form-login" onsubmit="handleLogin(event)">
            <div class="field-group">
                <label for="login-email">Adresse e-mail</label>
                <input type="email" id="login-email" placeholder="vous@exemple.fr" required autocomplete="email">
            </div>
            <div class="field-group">
                <label for="login-password">Mot de passe</label>
                <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit" class="auth-btn" id="btn-login">Se connecter</button>
        </form>

        <!-- ── Formulaire Inscription ── -->
        <form class="auth-form" id="form-register" onsubmit="handleRegister(event)">
            <div class="form-row">
                <div class="field-group">
                    <label for="reg-prenom">Prénom</label>
                    <input type="text" id="reg-prenom" placeholder="Jean" required>
                </div>
                <div class="field-group">
                    <label for="reg-nom">Nom</label>
                    <input type="text" id="reg-nom" placeholder="Dupont" required>
                </div>
            </div>
            <div class="field-group">
                <label for="reg-email">Adresse e-mail</label>
                <input type="email" id="reg-email" placeholder="vous@exemple.fr" required autocomplete="email">
            </div>
            <div class="field-group">
                <label for="reg-password">Mot de passe</label>
                <input type="password" id="reg-password" placeholder="Minimum 8 caractères" required minlength="8" autocomplete="new-password">
            </div>
            <button type="submit" class="auth-btn" id="btn-register">Créer mon compte</button>
        </form>

        <div class="auth-footer">
            <a href="index.html">← Retour à l'accueil</a>
        </div>

    </div>
</div>

<script type="module">
    import { login, register, isLoggedIn } from "./js/auth.js";

    // Redirection si déjà connecté
    if (isLoggedIn()) window.location.href = "compte.html";

    window.switchTab = function(tab) {
        document.getElementById("tab-login").classList.toggle("active", tab === "login");
        document.getElementById("tab-register").classList.toggle("active", tab === "register");
        document.getElementById("form-login").classList.toggle("active", tab === "login");
        document.getElementById("form-register").classList.toggle("active", tab === "register");
        clearMsg();
    };

    function showMsg(text, type) {
        const el = document.getElementById("auth-msg");
        el.textContent = text;
        el.className = "auth-msg " + type;
    }
    function clearMsg() {
        const el = document.getElementById("auth-msg");
        el.className = "auth-msg";
        el.textContent = "";
    }
    function setLoading(btnId, loading) {
        const btn = document.getElementById(btnId);
        btn.disabled = loading;
        btn.innerHTML = loading
            ? `<span class="spinner-inline"></span> Chargement…`
            : btn.dataset.label;
    }

    // Sauvegarder les labels initiaux
    document.getElementById("btn-login").dataset.label = "Se connecter";
    document.getElementById("btn-register").dataset.label = "Créer mon compte";

    window.handleLogin = async function(e) {
        e.preventDefault();
        clearMsg();
        setLoading("btn-login", true);
        const email = document.getElementById("login-email").value;
        const password = document.getElementById("login-password").value;
        try {
            await login(email, password);
            showMsg("Connexion réussie ! Redirection…", "success");
            setTimeout(() => window.location.href = "index.html", 800);
        } catch (err) {
            showMsg(err.message, "error");
            setLoading("btn-login", false);
        }
    };

    window.handleRegister = async function(e) {
        e.preventDefault();
        clearMsg();
        setLoading("btn-register", true);
        const prenom = document.getElementById("reg-prenom").value;
        const nom = document.getElementById("reg-nom").value;
        const email = document.getElementById("reg-email").value;
        const password = document.getElementById("reg-password").value;
        try {
            await register(email, password, prenom, nom);
            showMsg("Compte créé avec succès ! Bienvenue 🎉", "success");
            setTimeout(() => window.location.href = "index.html", 900);
        } catch (err) {
            showMsg(err.message, "error");
            setLoading("btn-register", false);
        }
    };
</script>

</body>
</html>
